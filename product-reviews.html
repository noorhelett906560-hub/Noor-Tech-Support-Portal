<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor CRM V2 - Live Review Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">

    <nav class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fa-solid fa-star text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-wide text-white">Noor <span class="text-blue-500">Review Hub</span></span>
            </div>
            <div class="text-sm bg-gray-800 px-3 py-1.5 rounded-full border border-gray-700 text-gray-300">
                <i class="fa-solid fa-check-double text-green-400 mr-1"></i> Connected to Live Tracker
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 border-l-4 border-l-blue-500">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Total Call Requests</h3>
                <div class="text-3xl font-black text-white" id="statTotal">0</div>
            </div>
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 border-l-4 border-l-amber-500">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Pending Reflect (2-3 Days Wait)</h3>
                <div class="text-3xl font-black text-amber-400" id="statPending">0</div>
            </div>
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 border-l-4 border-l-green-500">
                <h3 class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Live On Amazon ✔</h3>
                <div class="text-3xl font-black text-green-400" id="statLive">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800 h-fit">
                <h2 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-plus-circle text-blue-500 mr-2"></i>Log New Customer Review</h2>
                <form id="reviewForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Select Product SKU</label>
                        <select id="skuSelect" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-sm text-gray-200 focus:border-blue-500 outline-none">
                            <option value="HT15">Helett HT15 (Desktop Scanner)</option>
                            <option value="HT20">Helett HT20 (Wireless Scanner)</option>
                            <option value="HT410">Helett HT410 (Handheld Wired)</option>
                            <option value="HE24">Helett HE24 (Business Tech)</option>
                            <option value="RapidLabel-BT">RapidLabel™ BT (Shipping Printer)</option>
                            <option value="H80i">Helett H80i (POS Printer)</option>
                            <option value="H30C">Helett H30C (Adjustable Lite)</option>
                            <option value="infiniStick">infiniStick™ (Android TV)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Customer Name / Phone</label>
                        <input type="text" id="custName" placeholder="e.g. Ramesh Kumar" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-sm text-gray-200 focus:border-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Amazon Order ID</label>
                        <input type="text" id="orderId" placeholder="e.g. 403-XXXXXXX-XXXXXXX" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-sm text-gray-200 focus:border-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Initial Status</label>
                        <select id="initialStatus" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-2.5 text-sm text-gray-200 focus:border-blue-500 outline-none">
                            <option value="Pending">🟡 Pending Reflect (Waiting 2-3 Days)</option>
                            <option value="Live">🟢 Live On Amazon (Reflected)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition duration-200">
                        <i class="fa-solid fa-floppy-disk mr-2"></i>Save Feedback Entry
                    </button>
                </form>
            </div>

            <div class="lg:column-span-2 bg-gray-900 p-6 rounded-xl border border-gray-800">
                <h2 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-list-check text-purple-500 mr-2"></i>Ainvox Feedback Follow-up Queue</h2>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase font-semibold">
                                <th class="py-3 px-2">Product/SKU</th>
                                <th class="py-3 px-2">Customer & Order Details</th>
                                <th class="py-3 px-2 text-center">Status</th>
                                <th class="py-3 px-2 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="trackerTableBody" class="divide-y divide-gray-800/50 text-sm">
                            </tbody>
                    </table>
                    <div id="emptyMessage" class="text-center text-gray-500 py-8 text-sm hidden">
                        <i class="fa-solid fa-folder-open text-2xl mb-2 block"></i> No feedback calls logged yet. Add from the left panel!
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // LocalStorage used so data stays safe even on refresh
        let reviewLogs = JSON.parse(localStorage.getItem('noor_reviews_data')) || [];

        const form = document.getElementById('reviewForm');
        const tableBody = document.getElementById('trackerTableBody');
        const emptyMessage = document.getElementById('emptyMessage');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const log = {
                id: Date.now(),
                sku: document.getElementById('skuSelect').value,
                name: document.getElementById('custName').value,
                order: document.getElementById('orderId').value,
                status: document.getElementById('initialStatus').value,
                date: new Date().toLocaleDateString('en-IN')
            };

            reviewLogs.unshift(log);
            saveAndRender();
            form.reset();
        });

        function toggleStatus(id) {
            reviewLogs = reviewLogs.map(item => {
                if(item.id === id) {
                    item.status = item.status === 'Pending' ? 'Live' : 'Pending';
                }
                return item;
            });
            saveAndRender();
        }

        function deleteLog(id) {
            if(confirm('Are you sure you want to remove this log entry?')) {
                reviewLogs = reviewLogs.filter(item => item.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('noor_reviews_data', JSON.stringify(reviewLogs));
            renderTable();
        }

        function renderTable() {
            tableBody.innerHTML = '';
            
            if(reviewLogs.length === 0) {
                emptyMessage.classList.remove('hidden');
                updateStats(0, 0, 0);
                return;
            } else {
                emptyMessage.classList.add('hidden');
            }

            let total = reviewLogs.length;
            let pending = 0;
            let live = 0;

            reviewLogs.forEach(item => {
                let statusBadge = '';
                let toggleBtnText = '';
                
                if(item.status === 'Pending') {
                    pending++;
                    statusBadge = `<span class="bg-amber-950 text-amber-400 border border-amber-900 text-xs px-2 py-1 rounded-md font-medium"><i class="fa-solid fa-clock mr-1 animate-pulse"></i>Pending Reflect</span>`;
                    toggleBtnText = `<i class="fa-solid fa-check text-green-400 mr-1"></i> Mark Live`;
                } else {
                    live++;
                    statusBadge = `<span class="bg-green-950 text-green-400 border border-green-900 text-xs px-2 py-1 rounded-md font-medium"><i class="fa-solid fa-circle-check mr-1"></i>Live on Amazon</span>`;
                    toggleBtnText = `<i class="fa-solid fa-rotate-left text-amber-400 mr-1"></i> Revert`;
                }

                const row = document.createElement('tr');
                row.className = "hover:bg-gray-900/40 transition";
                row.innerHTML = `
                    <td class="py-4 px-2">
                        <span class="bg-gray-800 text-gray-200 border border-gray-700 font-mono text-xs px-2 py-1 rounded font-bold">${item.sku}</span>
                    </td>
                    <td class="py-4 px-2">
                        <div class="font-bold text-gray-200">${item.name}</div>
                        <div class="text-xs text-gray-400 font-mono mt-0.5">ID: ${item.order} | <i class="fa-regular fa-calendar-days text-[10px]"></i> ${item.date}</div>
                    </td>
                    <td class="py-4 px-2 text-center">
                        ${statusBadge}
                    </td>
                    <td class="py-4 px-2 text-right space-x-2">
                        <button onclick="toggleStatus(${item.id})" class="text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 font-semibold py-1 px-2.5 rounded transition">
                            ${toggleBtnText}
                        </button>
                        <button onclick="deleteLog(${item.id})" class="text-xs text-red-400 hover:text-red-300 bg-red-950/20 hover:bg-red-950/50 border border-red-900/30 p-1 px-2 rounded transition" title="Delete Log">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            updateStats(total, pending, live);
        }

        function updateStats(t, p, l) {
            document.getElementById('statTotal').innerText = t;
            document.getElementById('statPending').innerText = p;
            document.getElementById('statLive').innerText = l;
        }

        // Initial Boot Render
        renderTable();
    </script>
</body>
</html>
