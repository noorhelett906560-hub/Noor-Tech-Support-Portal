<!DOCTYPE html>
<html>
<head>
  <title>Noor-Tech CRM</title>
  <style>
    body { font-family: Arial; background: #f0f2f5; padding: 20px; }
    .crm-card { background: white; max-width: 700px; margin: auto; padding: 20px; border-radius: 10px; }
    input, select, textarea { width: 100%; padding: 8px; margin: 5px 0; }
    button { padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; }
  </style>
</head>
<body>

<div class="crm-card">
  <h2>Noor Tech CRM</h2>

  <form id="crmForm">
    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="text" id="phone" placeholder="Phone" required>
    <input type="text" id="sku" placeholder="Product SKU / Model" required>
    <input type="text" id="serial" placeholder="Serial Number">

    <select id="warranty">
      <option>In Warranty</option>
      <option>Out of Warranty</option>
    </select>

    <textarea id="issue" placeholder="Issue Details"></textarea>

    <select id="status">
      <option>Pending</option>
      <option>In Progress</option>
      <option>Resolved</option>
    </select>

    <textarea id="notes" placeholder="Remarks / Notes"></textarea>

    <button type="submit">Add</button>
  </form>

  <input type="text" id="search" placeholder="Search name / phone / SKU">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>SKU</th>
        <th>Warranty</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let data = JSON.parse(localStorage.getItem("crmData")) || [];

function displayData(filter="") {
  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  data
    .filter(item =>
      item.name.toLowerCase().includes(filter.toLowerCase()) ||
      item.phone.includes(filter) ||
      item.sku.toLowerCase().includes(filter.toLowerCase())
    )
    .forEach((item, index) => {
      table.innerHTML += `
        <tr>
          <td>${item.name}</td>
          <td>${item.phone}</td>
          <td>${item.sku}</td>
          <td>${item.warranty}</td>
          <td>${item.status}</td>
          <td><button onclick="deleteData(${index})">Delete</button></td>
        </tr>`;
    });
}

function deleteData(index) {
  data.splice(index, 1);
  localStorage.setItem("crmData", JSON.stringify(data));
  displayData();
}

document.getElementById("crmForm").addEventListener("submit", function(e){
  e.preventDefault();

  let newData = {
    name: name.value,
    phone: phone.value,
    sku: sku.value,
    serial: serial.value,
    warranty: warranty.value,
    issue: issue.value,
    status: status.value,
    notes: notes.value
  };

  data.push(newData);
  localStorage.setItem("crmData", JSON.stringify(data));
  displayData();
  this.reset();
});

document.getElementById("search").addEventListener("input", function(){
  displayData(this.value);
});

displayData();
</script>

</body>
</html>
