<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor-Tech Cloud CRM PRO - Enterprise Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --text: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--text); overflow: hidden; }
        .sidebar { width: 260px; background: var(--primary); height: 100vh; color: white; padding: 20px; position: fixed; }
        .sidebar h2 { font-size: 1.5rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; text-align: center; }
        .nav-item { padding: 12px 15px; margin: 5px 0; cursor: pointer; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: var(--secondary); }
        .main { margin-left: 280px; padding: 30px; width: calc(100% - 280px); height: 100vh; overflow-y: auto; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--secondary); }
        .form-section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .grid-layout label { font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: -10px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; font-size: 0.9rem; }
        textarea { grid-column: span 4; height: 80px; }
        .btn-group { margin-top: 20px; display: flex; gap: 12px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-save { background: var(--success); color: white; }
        .btn-update { background: var(--secondary); color: white; }
        .btn-export { background: var(--primary); color: white; }
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 18px; text-align: left; color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 18px; border-top: 1px solid #f1f5f9; cursor: pointer; font-size: 0.9rem; }
        tr:hover { background: #f8fafc; }
        .badge { padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-Pending { background: #fef3c7; color: #92400e; }
        .status-Resolved { background: #d1fae5; color: #065f46; }
        .status-InProgress { background: #dbeafe; color: #1e40af; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); overflow-y: auto; }
        .modal-content { background: var(--bg); margin: 2% auto; padding: 30px; width: 80%; max-width: 900px; border-radius: 20px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .close { position: absolute; right: 25px; top: 20px; font-size: 28px; cursor: pointer; color: var(--danger); }
        .modal-header { border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-rocket"></i> Noor-Tech</h2>
    <div class="nav-item active" onclick="showPage('dashboard', this)"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item" onclick="showPage('tickets', this)"><i class="fas fa-ticket-alt"></i> All Tickets</div>
    <div class="nav-item" onclick="showPage('customers', this)"><i class="fas fa-users"></i> Customers</div>
    <div class="nav-item" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Export Excel</div>
</div>

<div class="main">
    <div id="dashboard" class="page-content active">
        <div class="stats-grid">
            <div class="stat-card"><h4>Inbound Tickets</h4><div id="countTotal" style="font-size:1.8rem; font-weight:800;">0</div></div>
            <div class="stat-card" style="border-left-color: var(--warning)"><h4>Pending</h4><div id="countPending" style="font-size:1.8rem; font-weight:800;">0</div></div>
            <div class="stat-card" style="border-left-color: var(--success)"><h4>Resolved</h4><div id="countResolved" style="font-size:1.8rem; font-weight:800; color: var(--success)">0</div></div>
            <div class="stat-card" style="border-left-color: var(--danger)"><h4>Replacements</h4><div id="countReplace" style="font-size:1.8rem; font-weight:800; color: var(--danger)">0</div></div>
        </div>

        <div class="form-section">
            <h3><i class="fas fa-plus-circle"></i> Create New Inbound Ticket</h3>
            <form id="crmForm">
                <div class="grid-layout">
                    <input type="text" id="custName" placeholder="Customer Name" required>
                    <input type="text" id="custPhone" placeholder="Mobile Number" required>
                    <input type="email" id="custEmail" placeholder="Email Address">
                    <input type="text" id="invNo" placeholder="Invoice No" required>
                    <input type="text" id="sku" placeholder="SKU/Model" required>
                    <input type="text" id="serial" placeholder="Serial Number (S/N)">
                    
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label>Purchase Date</label>
                        <input type="date" id="purchaseDate">
                    </div>

                    <select id="priority">
                        <option value="Low">Priority: Low</option>
                        <option value="Medium">Priority: Medium</option>
                        <option value="High">Priority: High 🔥</option>
                    </select>
                    <select id="issueType">
                        <option value="Technical">Technical Issue</option>
                        <option value="Replacement">Replacement</option>
                        <option value="Repair">Repair</option>
                    </select>
                    <select id="status">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                    <select id="warranty">
                        <option value="In Warranty">In Warranty</option>
                        <option value="Out of Warranty">Out of Warranty</option>
                    </select>
                    <select id="source">
                        <option value="Call">Source: Call</option>
                        <option value="WhatsApp">Source: WhatsApp</option>
                        <option value="Email">Source: Email</option>
                    </select>
                    <textarea id="issueNote" placeholder="Explain the problem deeply..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-save"><i class="fas fa-cloud-upload-alt"></i> Save to Google Cloud</button>
                </div>
            </form>
        </div>
    </div>

    <div id="tickets" class="page-content">
        <h3><i class="fas fa-list"></i> Inbound Management</h3>
        <input type="text" id="search" style="padding:15px; margin-bottom:20px; border-radius:12px; border:2px solid #e2e8f0; width:100%;" placeholder="🔍 Search by Name, Phone, or Invoice...">
        <div class="table-container">
            <table>
                <thead><tr><th>ID</th><th>Customer Details</th><th>Product / SKU</th><th>Status</th><th>Log Date</th></tr></thead>
                <tbody id="crmTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="customers" class="page-content">
        <h3><i class="fas fa-users"></i> Customer Database</h3>
        <div class="table-container">
            <table>
                <thead><tr><th>Customer Name</th><th>Phone</th><th>Email</th></tr></thead>
                <tbody id="customerTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> Edit Full Ticket Details</h3>
            <p id="modalTicketID" style="font-weight:bold; color:var(--secondary);"></p>
        </div>
        <form id="editForm">
            <div class="grid-layout">
                <div style="grid-column: span 1"><label>Name</label><input type="text" id="editCustName"></div>
                <div style="grid-column: span 1"><label>Phone</label><input type="text" id="editCustPhone"></div>
                <div style="grid-column: span 1"><label>Email</label><input type="text" id="editCustEmail"></div>
                <div style="grid-column: span 1"><label>Invoice No</label><input type="text" id="editInvNo"></div>
                <div style="grid-column: span 1"><label>SKU/Model</label><input type="text" id="editSku"></div>
                <div style="grid-column: span 1"><label>Serial No</label><input type="text" id="editSerial"></div>
                <div style="grid-column: span 1"><label>Purchase Date</label><input type="date" id="editPurchaseDate"></div>
                <div style="grid-column: span 1">
                    <label>Status</label>
                    <select id="editStatus">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <div style="grid-column: span 1">
                    <label>Priority</label>
                    <select id="editPriority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div style="grid-column: span 1">
                    <label>Issue Type</label>
                    <select id="editIssueType">
                        <option value="Technical">Technical</option>
                        <option value="Replacement">Replacement</option>
                        <option value="Repair">Repair</option>
                    </select>
                </div>
                <div style="grid-column: span 2">
                    <label>Notes</label>
                    <textarea id="editIssueNote" style="height:60px;"></textarea>
                </div>
            </div>
            <button type="button" class="btn btn-update" onclick="saveFullUpdate()" style="width:100%; margin-top:20px; justify-content:center;">
                <i class="fas fa-check-circle"></i> Update Changes to Cloud
            </button>
        </form>
    </div>
</div>

<script>
    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCVXygnMOKaPVbadqlX9AgWiuUdKW6mTOc",
        authDomain: "noor-crm.firebaseapp.com",
        projectId: "noor-crm",
        storageBucket: "noor-crm.firebasestorage.app",
        messagingSenderId: "147857712332",
        appId: "1:147857712332:web:4cae3b8b9c00009aa0ce69",
        databaseURL: "https://noor-crm-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('noor_cloud_tickets');
    let allTickets = [];
    let currentEditingID = null;

    function showPage(pageId, element) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        element.classList.add('active');
    }

    db.on('value', (snapshot) => {
        allTickets = [];
        snapshot.forEach((child) => { allTickets.push(child.val()); });
        updateUI();
    });

    function updateUI() {
        document.getElementById('countTotal').innerText = allTickets.length;
        document.getElementById('countPending').innerText = allTickets.filter(t => t.status === 'Pending').length;
        document.getElementById('countResolved').innerText = allTickets.filter(t => t.status === 'Resolved').length;
        document.getElementById('countReplace').innerText = allTickets.filter(t => t.issueType === 'Replacement').length;

        const tableBody = document.getElementById('crmTableBody');
        const custBody = document.getElementById('customerTableBody');
        tableBody.innerHTML = ''; custBody.innerHTML = '';

        allTickets.forEach((item) => {
            tableBody.innerHTML += `
                <tr onclick="openModal('${item.id}')">
                    <td>#${item.id.toString().slice(-4)}</td>
                    <td><strong>${item.name}</strong><br><small>${item.phone}</small></td>
                    <td>${item.sku}<br><small>${item.issueType || 'General'}</small></td>
                    <td><span class="badge status-${item.status.replace(/\s+/g, '')}">${item.status}</span></td>
                    <td>${item.date}</td>
                </tr>`;
            custBody.innerHTML += `<tr><td>${item.name}</td><td>${item.phone}</td><td>${item.email}</td></tr>`;
        });
    }

    document.getElementById('crmForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const id = Date.now();
        const ticket = {
            id: id,
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            email: document.getElementById('custEmail').value || 'N/A',
            inv: document.getElementById('invNo').value,
            sku: document.getElementById('sku').value,
            sn: document.getElementById('serial').value || 'N/A',
            purchaseDate: document.getElementById('purchaseDate').value || 'N/A',
            priority: document.getElementById('priority').value,
            issueType: document.getElementById('issueType').value,
            status: document.getElementById('status').value,
            warranty: document.getElementById('warranty').value,
            source: document.getElementById('source').value,
            note: document.getElementById('issueNote').value,
            date: new Date().toLocaleDateString()
        };
        db.child(id).set(ticket);
        alert("Success: Saved to Google Cloud!");
        this.reset();
    });

    // OPEN FULL EDIT MODAL
    function openModal(id) {
        currentEditingID = id;
        const ticket = allTickets.find(t => t.id == id);
        
        document.getElementById('modalTicketID').innerText = `Editing Ticket #${id.toString().slice(-4)}`;
        
        // Fill Modal Fields
        document.getElementById('editCustName').value = ticket.name;
        document.getElementById('editCustPhone').value = ticket.phone;
        document.getElementById('editCustEmail').value = ticket.email;
        document.getElementById('editInvNo').value = ticket.inv;
        document.getElementById('editSku').value = ticket.sku;
        document.getElementById('editSerial').value = ticket.sn;
        document.getElementById('editPurchaseDate').value = ticket.purchaseDate !== 'N/A' ? ticket.purchaseDate : '';
        document.getElementById('editStatus').value = ticket.status;
        document.getElementById('editPriority').value = ticket.priority;
        document.getElementById('editIssueType').value = ticket.issueType;
        document.getElementById('editIssueNote').value = ticket.note;

        document.getElementById('editModal').style.display = "block";
    }

    function closeModal() { document.getElementById('editModal').style.display = "none"; }

    // SAVE FULL UPDATE
    function saveFullUpdate() {
        const updatedData = {
            name: document.getElementById('editCustName').value,
            phone: document.getElementById('editCustPhone').value,
            email: document.getElementById('editCustEmail').value,
            inv: document.getElementById('editInvNo').value,
            sku: document.getElementById('editSku').value,
            sn: document.getElementById('editSerial').value,
            purchaseDate: document.getElementById('editPurchaseDate').value || 'N/A',
            status: document.getElementById('editStatus').value,
            priority: document.getElementById('editPriority').value,
            issueType: document.getElementById('editIssueType').value,
            note: document.getElementById('editIssueNote').value
        };

        db.child(currentEditingID).update(updatedData);
        closeModal();
        alert("Success: Full Ticket Updated on Cloud!");
    }

    function exportExcel() {
        if(allTickets.length === 0) return alert("No data to export!");
        let csv = "ID,Name,Phone,Email,Invoice,SKU,SN,PurchaseDate,Priority,Issue,Status,Warranty,Source,LogDate\n";
        allTickets.forEach(t => { 
            csv += `${t.id},${t.name},${t.phone},${t.email},${t.inv},${t.sku},${t.sn},${t.purchaseDate},${t.priority},${t.issueType},${t.status},${t.warranty},${t.source},${t.date}\n`; 
        });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = 'Noor-Inbound-Report.csv'; a.click();
    }

    document.getElementById('search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('#crmTableBody tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
        });
    });
</script>
</body>
</html>
