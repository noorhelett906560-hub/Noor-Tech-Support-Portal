<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Noor CRM</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY",
  authDomain: "noor-crm.firebaseapp.com",
  projectId: "noor-crm",
  storageBucket: "noor-crm.appspot.com",
  messagingSenderId: "147857712332",
  appId: "1:147857712332:web:4cae3b8b9c00009aa0ce69"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];

async function loadData(){
  const query = await getDocs(collection(db,"crm"));
  data=[];
  query.forEach(doc=>data.push(doc.data()));
  render();
}

function render(filter=""){
  let html="";
  data.filter(x=>x.name.toLowerCase().includes(filter.toLowerCase()))
  .forEach(d=>{
    html+=`
    <tr>
      <td>${d.name}</td>
      <td>${d.phone}</td>
      <td>${d.sku}</td>
      <td>${d.status}</td>
    </tr>`;
  });
  document.getElementById("table").innerHTML=html;
}

window.addData = async ()=>{
  await addDoc(collection(db,"crm"),{
    name:name.value,
    phone:phone.value,
    sku:sku.value,
    status:status.value
  });
  loadData();
}

window.searchData=(v)=>render(v);

window.onload=loadData;
</script>

<style>
body{font-family:Arial;padding:20px;background:#f5f6fa;}
input,select{width:100%;padding:8px;margin:5px 0;}
button{padding:10px;background:blue;color:white;border:none;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{border:1px solid #ccc;padding:8px;}
</style>

</head>

<body>

<h2>Noor CRM 🚀</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="sku" placeholder="SKU">

<select id="status">
<option>Pending</option>
<option>Resolved</option>
</select>

<button onclick="addData()">Save</button>

<input placeholder="Search" oninput="searchData(this.value)">

<table>
<thead>
<tr><th>Name</th><th>Phone</th><th>SKU</th><th>Status</th></tr>
</thead>
<tbody id="table"></tbody>
</table>

</body>
</html>
