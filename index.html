<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor-Tech Ultimate CRM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --secondary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--text); }
        .sidebar { width: 240px; background: var(--primary); height: 100vh; color: white; padding: 25px; position: fixed; }
        .main { margin-left: 280px; padding: 30px; width: calc(100% - 280px); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid var(--secondary); }
        .form-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        textarea { grid-column: span 4; height: 70px; }
        .btn-group { margin-top: 20px; display: flex; gap: 12px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background: var(--success); }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
        th { background: #f8fafc; padding: 15px; text-align: left; color: #64748b; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-Pending { background: #fef3c7; color: #92400e; }
        .status-Resolved { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-microchip"></i> Noor-Tech</h2>
    <div class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</div>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card"><h4>Total Cases</h4><div id="countTotal" class="value">0</div></div>
        <div class="stat-card"><h4>Pending</h4><div id="countPending" class="value">0</div></div>
        <div class="stat-card"><h4>Replacements</h4><div id="countReplace" class="value">0</div></div>
        <div class="stat-card"><h4>Resolved</h4><div id="countResolved" class="value">0</div></div>
    </div>

    <div class="form-section">
        <h3>Create New Ticket</h3>
        <form id="crmForm">
            <div class="grid-layout">
                <input type="text" id="custName" placeholder="Customer Name" required>
                <input type="text" id="custPhone" placeholder="Mobile Number" required>
                <input type="text" id="invNo" placeholder="Invoice Number" required>
                <input type="text" id="sku" placeholder="SKU / Model Number" required>
                <input type="text" id="serial" placeholder="Serial Number (S/N)">
                
                <select id="issueType">
                    <option value="Technical">Technical Issue</option>
                    <option value="Repair">Repair Request</option>
                    <option value="Replacement">Replacement</option>
                </select>

                <select id="priority">
                    <option value="Low">Low Priority</option>
                    <option value="High">High Priority 🔥</option>
                </select>

                <select id="warranty">
                    <option value="In Warranty">In Warranty</option>
                    <option value="Out of Warranty">Out of Warranty</option>
                </select>

                <select id="status">
                    <option value="Pending">Pending</option>
                    <option value="Resolved">Resolved</option>
                </select>

                <textarea id="issueNote" placeholder="Technical Problem Description..."></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-save">Save Ticket</button>
            </div>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Product</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="crmTableBody"></tbody>
    </table>
</div>

<script>
    // 1. Database Setup
    let crmStorage = JSON.parse(localStorage.getItem('noor_ultimate_db')) || [];

    // 2. Dashboard Update Function
    function updateUI() {
        document.getElementById('countTotal').innerText = crmStorage.length;
        document.getElementById('countPending').innerText = crmStorage.filter(t => t.status === 'Pending').length;
        document.getElementById('countReplace').innerText = crmStorage.filter(t => t.type === 'Replacement').length;
        document.getElementById('countResolved').innerText = crmStorage.filter(t => t.status === 'Resolved').length;

        const tableBody = document.getElementById('crmTableBody');
        tableBody.innerHTML = '';

        crmStorage.forEach((item) => {
            tableBody.innerHTML += `
                <tr>
                    <td>#${item.id}</td>
                    <td><strong>${item.name}</strong><br>${item.phone}</td>
                    <td>${item.sku}<br><small>${item.sn}</small></td>
                    <td><span class="badge status-${item.status}">${item.status}</span></td>
                    <td>${item.date}</td>
                </tr>`;
        });
    }

    // 3. Save Function
    document.getElementById('crmForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const ticket = {
            id: Math.floor(1000 + Math.random() * 9000),
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            inv: document.getElementById('invNo').value,
            sku: document.getElementById('sku').value,
            sn: document.getElementById('serial').value,
            type: document.getElementById('issueType').value,
            priority: document.getElementById('priority').value,
            warranty: document.getElementById('warranty').value,
            status: document.getElementById('status').value,
            date: new Date().toLocaleDateString(),
            note: document.getElementById('issueNote').value
        };

        crmStorage.unshift(ticket);
        localStorage.setItem('noor_ultimate_db', JSON.stringify(crmStorage));

        // GOOGLE SHEET LINK (Optional)
        // fetch('YAHAN_URL_DALEIN', { method: 'POST', mode: 'no-cors', body: new URLSearchParams(ticket) });

        alert("Ticket Save ho gaya!");
        updateUI();
        this.reset();
    });

    updateUI();
</script>
</body>
</html>
