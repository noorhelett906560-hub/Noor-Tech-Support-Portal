<!DOCTYPE html>
<html>
<head>
  <title>Noor-Tech CRM</title>
  <style>
    body { font-family: Arial; background: #f0f2f5; padding: 20px; }
    .crm-card { background: white; max-width: 600px; margin: auto; padding: 20px; border-radius: 10px; }
    input, select { width: 100%; padding: 8px; margin: 5px 0; }
    button { padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; }
  </style>
</head>
<body>

<div class="crm-card">
  <h2>Noor Tech CRM</h2>

  <form id="crmForm">
    <input type="text" id="name" placeholder="Customer Name" required>
    <input type="text" id="phone" placeholder="Phone" required>
    <input type="text" id="serial" placeholder="Serial Number">
    <input type="text" id="location" placeholder="City & State">

    <select id="type">
      <option>Warranty</option>
      <option>Technical</option>
      <option>Replacement</option>
      <option>Repair</option>
    </select>

    <select id="status">
      <option>Pending</option>
      <option>In Progress</option>
      <option>Resolved</option>
    </select>

    <button type="submit">Add</button>
  </form>

  <input type="text" id="search" placeholder="Search...">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Serial</th>
        <th>Location</th>
        <th>Type</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let data = JSON.parse(localStorage.getItem("crmData")) || [];

function displayData(filter="") {
  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  data
    .filter(item => item.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach((item, index) => {
      table.innerHTML += `
        <tr>
          <td>${item.name}</td>
          <td>${item.phone}</td>
          <td>${item.serial}</td>
          <td>${item.location}</td>
          <td>${item.type}</td>
          <td>${item.status}</td>
          <td><button onclick="deleteData(${index})">Delete</button></td>
        </tr>`;
    });
}

function deleteData(index) {
  data.splice(index, 1);
  localStorage.setItem("crmData", JSON.stringify(data));
  displayData();
}

document.getElementById("crmForm").addEventListener("submit", function(e){
  e.preventDefault();

  let newData = {
    name: name.value,
    phone: phone.value,
    serial: serial.value,
    location: location.value,
    type: type.value,
    status: status.value
  };

  data.push(newData);
  localStorage.setItem("crmData", JSON.stringify(data));
  displayData();
  this.reset();
});

document.getElementById("search").addEventListener("input", function(){
  displayData(this.value);
});

displayData();
</script>

</body>
</html>
