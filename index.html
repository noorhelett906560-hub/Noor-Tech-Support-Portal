<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor-Tech Ultimate CRM PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --text: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--text); }
        .sidebar { width: 240px; background: var(--primary); height: 100vh; color: white; padding: 25px; position: fixed; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .main { margin-left: 280px; padding: 30px; width: calc(100% - 280px); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid var(--secondary); }
        
        .form-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        textarea { grid-column: span 4; height: 70px; }
        
        .btn-group { margin-top: 20px; display: flex; gap: 12px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .btn-save { background: var(--success); color: white; }
        .btn-export { background: var(--primary); color: white; }

        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; cursor: pointer; font-size: 0.9rem; }
        tr:hover { background: #f8fafc; }
        
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-Pending { background: #fef3c7; color: #92400e; }
        .status-Resolved { background: #d1fae5; color: #065f46; }
        .status-InProgress { background: #dbeafe; color: #1e40af; }

        /* Modal Popup */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 400px; border-radius: 15px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-microchip"></i> Noor-Tech</h2>
    <div class="nav-item active" style="color:white; cursor:default;"><i class="fas fa-chart-line"></i> Dashboard</div>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card"><h4>Total Cases</h4><div id="countTotal" style="font-size:1.5rem; font-weight:bold;">0</div></div>
        <div class="stat-card" style="border-left-color: var(--warning)"><h4>Pending</h4><div id="countPending" style="font-size:1.5rem; font-weight:bold;">0</div></div>
        <div class="stat-card" style="border-left-color: var(--success)"><h4>Resolved</h4><div id="countResolved" style="font-size:1.5rem; font-weight:bold; color: var(--success)">0</div></div>
    </div>

    <div class="form-section">
        <h3><i class="fas fa-plus-circle"></i> Create New Ticket</h3>
        <form id="crmForm">
            <div class="grid-layout">
                <input type="text" id="custName" placeholder="Customer Name" required>
                <input type="text" id="custPhone" placeholder="Mobile" required>
                <input type="email" id="custEmail" placeholder="Email ID">
                <input type="text" id="invNo" placeholder="Invoice No" required>
                <input type="text" id="sku" placeholder="SKU/Model" required>
                <select id="priority">
                    <option value="Low">Priority: Low</option>
                    <option value="Medium">Priority: Medium</option>
                    <option value="High">Priority: High 🔥</option>
                </select>
                <select id="status">
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                </select>
                <textarea id="issueNote" placeholder="Technical Problem Description..."></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Save Ticket</button>
                <button type="button" class="btn btn-export" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Export Data</button>
            </div>
        </form>
    </div>

    <input type="text" id="search" style="padding:15px; margin-bottom:20px; border-radius:12px; border:2px solid #e2e8f0; width:100%; box-sizing:border-box;" placeholder="🔍 Search by Name, Phone or Invoice...">

    <div class="table-container">
        <table>
            <thead><tr><th>ID</th><th>Customer</th><th>Product</th><th>Status</th><th>Priority</th><th>Date</th></tr></thead>
            <tbody id="crmTableBody"></tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>Update Ticket</h3>
        <p id="modalTicketID" style="font-weight: bold; color: var(--secondary);"></p>
        <label>Change Status:</label>
        <select id="editStatus" style="margin-top:10px; margin-bottom:20px;">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
        </select>
        <button class="btn btn-save" onclick="saveUpdate()" style="width:100%;">Update Changes</button>
    </div>
</div>

<script>
    let crmStorage = JSON.parse(localStorage.getItem('noor_ultimate_db')) || [];
    let currentEditingID = null;

    function updateUI() {
        document.getElementById('countTotal').innerText = crmStorage.length;
        document.getElementById('countPending').innerText = crmStorage.filter(t => t.status === 'Pending').length;
        document.getElementById('countResolved').innerText = crmStorage.filter(t => t.status === 'Resolved').length;
        
        const tableBody = document.getElementById('crmTableBody');
        tableBody.innerHTML = '';

        crmStorage.forEach((item) => {
            tableBody.innerHTML += `
                <tr onclick="openModal(${item.id})">
                    <td>#${item.id}</td>
                    <td><strong>${item.name}</strong><br><small>${item.phone}</small></td>
                    <td>${item.sku}</td>
                    <td><span class="badge status-${item.status.replace(' ', '')}">${item.status}</span></td>
                    <td>${item.priority}</td>
                    <td>${item.date}</td>
                </tr>`;
        });
    }

    document.getElementById('crmForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const ticket = {
            id: Math.floor(1000 + Math.random() * 9000),
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            email: document.getElementById('custEmail').value || 'N/A',
            inv: document.getElementById('invNo').value,
            sku: document.getElementById('sku').value,
            priority: document.getElementById('priority').value,
            status: document.getElementById('status').value,
            note: document.getElementById('issueNote').value,
            date: new Date().toLocaleDateString()
        };
        crmStorage.unshift(ticket);
        localStorage.setItem('noor_ultimate_db', JSON.stringify(crmStorage));
        updateUI();
        this.reset();
    });

    function openModal(id) {
        currentEditingID = id;
        const ticket = crmStorage.find(t => t.id == id);
        document.getElementById('modalTicketID').innerText = "Updating Ticket #" + id;
        document.getElementById('editStatus').value = ticket.status;
        document.getElementById('editModal').style.display = "block";
    }

    function closeModal() { document.getElementById('editModal').style.display = "none"; }

    function saveUpdate() {
        const index = crmStorage.findIndex(t => t.id == currentEditingID);
        crmStorage[index].status = document.getElementById('editStatus').value;
        localStorage.setItem('noor_ultimate_db', JSON.stringify(crmStorage));
        updateUI();
        closeModal();
    }

    function exportExcel() {
        if(crmStorage.length === 0) return alert("Pehle data toh save kijiye!");
        let csv = "ID,Name,Phone,Email,Invoice,SKU,Priority,Status,Date\n";
        crmStorage.forEach(t => {
            csv += `${t.id},${t.name},${t.phone},${t.email},${t.inv},${t.sku},${t.priority},${t.status},${t.date}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Noor-Tech-Master-Data.csv';
        a.click();
    }

    document.getElementById('search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('#crmTableBody tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
        });
    });

    updateUI();
</script>
</body>
</html>
