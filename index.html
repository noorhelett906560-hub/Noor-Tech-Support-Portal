<!-- SAME HEAD + CSS (tumhara rehne do, niche JS + table update kar raha hoon) -->

<!-- 🔥 TABLE UPDATE -->
<thead>
<tr>
    <th>ID</th>
    <th>Customer</th>
    <th>Contact</th>
    <th>S/N</th>
    <th>Warranty</th>
    <th>Status</th>
    <th>Priority</th>
    <th>Date</th>
    <th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>

<script>
let crmData = JSON.parse(localStorage.getItem("noorCrmData")) || [];

function updateStats() {
    document.getElementById("countTotal").innerText = crmData.length;
    document.getElementById("countPending").innerText = crmData.filter(x => x.status === "Pending").length;
    document.getElementById("countResolved").innerText = crmData.filter(x => x.status === "Resolved").length;
}

function renderTable(filter = "") {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    crmData
    .filter(item =>
        item.name.toLowerCase().includes(filter.toLowerCase()) ||
        item.phone.includes(filter) ||
        item.sku.toLowerCase().includes(filter.toLowerCase()) ||
        item.serial.toLowerCase().includes(filter.toLowerCase())
    )
    .forEach((item, index) => {

        let statusClass = item.status === "Pending" ? "bg-pending" :
                         item.status === "Resolved" ? "bg-resolved" : "bg-progress";

        let warrantyColor = item.warranty === "Out of Warranty" ? "red" : "green";

        tbody.innerHTML += `
        <tr>
            <td>#${item.id}</td>
            <td><strong>${item.name}</strong><br><small>${item.sku}</small></td>
            <td>${item.phone}</td>
            <td>${item.serial}</td>
            <td style="color:${warrantyColor}">${item.warranty}</td>
            <td><span class="badge ${statusClass}">${item.status}</span></td>
            <td>${item.priority || "Normal"}</td>
            <td>${item.date}</td>
            <td>
                <button onclick="editData(${index})">✏️</button>
                <button onclick="deleteData(${index})">❌</button>
            </td>
        </tr>`;
    });

    updateStats();
}

function deleteData(index) {
    if(confirm("Delete this record?")){
        crmData.splice(index,1);
        localStorage.setItem("noorCrmData", JSON.stringify(crmData));
        renderTable();
    }
}

function editData(index){
    let item = crmData[index];

    name.value = item.name;
    phone.value = item.phone;
    sku.value = item.sku;
    serial.value = item.serial;
    warranty.value = item.warranty;
    status.value = item.status;
    issue.value = item.issue;

    crmData.splice(index,1);
}

document.getElementById("crmForm").addEventListener("submit", (e) => {
    e.preventDefault();

    const entry = {
        id: Date.now(),
        name: name.value,
        phone: phone.value,
        sku: sku.value,
        serial: serial.value,
        warranty: warranty.value,
        status: status.value,
        issue: issue.value,
        priority: "Normal",
        date: new Date().toLocaleString()
    };

    crmData.unshift(entry);

    localStorage.setItem("noorCrmData", JSON.stringify(crmData));

    renderTable();
    e.target.reset();
});

document.getElementById("search").addEventListener("input", (e) => renderTable(e.target.value));

renderTable();
</script>
