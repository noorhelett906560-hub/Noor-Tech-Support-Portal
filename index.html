<!DOCTYPE html>
<html>
<head>
  <title>Noor-Tech CRM v2</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
    .crm-card { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: #1a73e8; text-align: center; }
    label { font-weight: bold; display: block; margin-top: 15px; color: #5f6368; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #dadce0; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; background-color: #1a73e8; color: white; padding: 12px; border: none; border-radius: 5px; margin-top: 25px; cursor: pointer; font-size: 16px; font-weight: bold; }
    button:hover { background-color: #1557b0; }
  </style>
</head>
<body>

<div class="crm-card">
  <h2>Noor Tech Support</h2>
  <form id="crmForm" action="APNA_SCRIPT_URL_YAHAN_PASTE_KAREIN" method="POST">
    
    <label>Customer Name</label>
    <input type="text" name="name" placeholder="Enter name" required>

    <label>Phone Number</label>
    <input type="text" name="phone" placeholder="Enter mobile number" required>

    <label>Product Serial Number (S/N)</label>
    <input type="text" name="serial" placeholder="e.g. NT2026-XXXX" required>

    <label>City & State</label>
    <input type="text" name="location" placeholder="e.g. Thiruvalla, Kerala" required>

    <label>Issue Type</label>
    <select name="type">
      <option value="Warranty Check">Warranty Registration</option>
      <option value="Technical Issue">Technical Issue</option>
      <option value="Replacement Request">Replacement Request</option>
      <option value="Repair Service">Repair Service</option>
    </select>

    <label>Status</label>
    <select name="status">
      <option value="Pending">Pending</option>
      <option value="In Progress">In Progress</option>
      <option value="Resolved">Resolved</option>
    </select>

    <button type="submit">Submit to Dashboard</button>
  </form>
</div>

</body>
</html>
