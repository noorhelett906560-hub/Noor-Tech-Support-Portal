<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor-Tech Ultimate CRM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a; --secondary: #3b82f6; --success: #10b981;
            --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; --text: #1e293b;
        }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; color: var(--text); }
        
        /* Sidebar Navigation */
        .sidebar { width: 240px; background: var(--primary); height: 100vh; color: white; padding: 25px; position: fixed; }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .nav-item { padding: 12px; margin: 8px 0; cursor: pointer; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--secondary); }

        /* Main Content Area */
        .main { margin-left: 280px; padding: 30px; width: calc(100% - 280px); }
        
        /* Statistics Header */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-left: 5px solid var(--secondary); }
        .stat-card h4 { margin: 0; color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; margin-top: 10px; color: var(--primary); }

        /* Professional Form */
        .form-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-section h3 { margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; }
        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        
        input, select, textarea { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--secondary); }
        textarea { grid-column: span 4; height: 70px; }
        
        .btn-group { margin-top: 20px; display: flex; gap: 12px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .btn-save { background: var(--success); color: white; }
        .btn-export { background: var(--primary); color: white; }

        /* Data Table */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        /* Badges */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-Pending { background: #fef3c7; color: #92400e; }
        .status-Resolved { background: #d1fae5; color: #065f46; }
        .priority-High { color: var(--danger); border-left: 3px solid var(--danger); padding-left: 5px; }

        .search-box { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2><i class="fas fa-microchip"></i> Noor-Tech</h2>
    <div class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</div>
    <div class="nav-item"><i class="fas fa-ticket-alt"></i> All Tickets</div>
    <div class="nav-item"><i class="fas fa-users"></i> Customers</div>
    <div class="nav-item"><i class="fas fa-file-invoice"></i> Invoices</div>
    <div class="nav-item"><i class="fas fa-cog"></i> Settings</div>
</div>

<div class="main">
    <div class="stats-grid">
        <div class="stat-card"><h4>Total Cases</h4><div id="countTotal">0</div></div>
        <div class="stat-card" style="border-left-color: var(--warning)"><h4>Pending</h4><div id="countPending">0</div></div>
        <div class="stat-card" style="border-left-color: var(--danger)"><h4>Replacements</h4><div id="countReplace">0</div></div>
        <div class="stat-card" style="border-left-color: var(--success)"><h4>Resolved</h4><div id="countResolved">0</div></div>
    </div>

    <div class="form-section">
        <h3><i class="fas fa-plus-circle"></i> Create New Ticket</h3>
        <form id="crmForm">
            <div class="grid-layout">
                <input type="text" id="custName" placeholder="Customer Name" required>
                <input type="text" id="custPhone" placeholder="Mobile Number" required>
                <input type="email" id="custEmail" placeholder="Customer Email">
                <input type="text" id="custCity" placeholder="City / State">
                
                <input type="text" id="invNo" placeholder="Invoice Number" required>
                <input type="text" id="sku" placeholder="SKU / Model Number" required>
                <input type="text" id="serial" placeholder="Serial Number (S/N)">
                
                <select id="issueType">
                    <option value="Technical">Technical Issue</option>
                    <option value="Repair">Repair Request</option>
                    <option value="Replacement">Replacement</option>
                    <option value="Software">Software Support</option>
                </select>

                <select id="priority">
                    <option value="Low">Priority: Low</option>
                    <option value="Medium">Priority: Medium</option>
                    <option value="High">Priority: High 🔥</option>
                </select>

                <select id="warranty">
                    <option value="In Warranty">In Warranty</option>
                    <option value="Out of Warranty">Out of Warranty</option>
                </select>

                <select id="status">
                    <option value="Pending">Status: Pending</option>
                    <option value="In Progress">Status: In Progress</option>
                    <option value="Resolved">Status: Resolved</option>
                </select>

                <select id="source">
                    <option value="Call">Source: Call</option>
                    <option value="WhatsApp">Source: WhatsApp</option>
                    <option value="Email">Source: Email</option>
                </select>

                <textarea id="issueNote" placeholder="Technical Problem Description & Remarks..."></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Save Ticket</button>
                <button type="button" class="btn btn-export" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Export Data</button>
            </div>
        </form>
    </div>

    <input type="text" id="search" class="search-box" placeholder="🔍 Search by Name, Phone, Serial or Invoice Number...">
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Ticket ID</th>
                    <th>Customer</th>
                    <th>Product / SKU</th>
                    <th>Invoice / SN</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="crmTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let crmStorage = JSON.parse(localStorage.getItem('noor_ultimate_db')) || [];

    function updateUI() {
        // Counter logic
        document.getElementById('countTotal').innerText = crmStorage.length;
        document.getElementById('countPending').innerText = crmStorage.filter(t => t.status === 'Pending').length;
        document.getElementById('countReplace').innerText = crmStorage.filter(t => t.type === 'Replacement').length;
        document.getElementById('countResolved').innerText = crmStorage.filter(t => t.status === 'Resolved').length;

        const tableBody = document.getElementById('crmTableBody');
        tableBody.innerHTML = '';

        crmStorage.forEach((item, index) => {
            tableBody.innerHTML += `
                <tr>
                    <td><small>#${item.id}</small></td>
                    <td><strong>${item.name}</strong><br><small>${item.phone}</small></td>
                    <td>${item.sku}<br><small>${item.type}</small></td>
                    <td>Inv: ${item.inv}<br><small>SN: ${item.sn}</small></td>
                    <td><span class="badge status-${item.status}">${item.status}</span></td>
                    <td class="priority-${item.priority}">${item.priority}</td>
                    <td>${item.date}</td>
                </tr>
            `;
        });
    }

    document.getElementById('crmForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const ticket = {
            id: Math.floor(1000 + Math.random() * 9000), // Unique ID
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            email: document.getElementById('custEmail').value,
            city: document.getElementById('custCity').value,
            inv: document.getElementById('invNo').value,
            sku: document.getElementById('sku').value,
            sn: document.getElementById('serial').value,
            type: document.getElementById('issueType').value,
            priority: document.getElementById('priority').value,
            warranty: document.getElementById('warranty').value,
            status: document.getElementById('status').value,
            source: document.getElementById('source').value,
            note: document.getElementById('issueNote').value,
            date: new Date().toLocaleDateString()
        };

        crmStorage.unshift(ticket);
        localStorage.setItem('noor_ultimate_db', JSON.stringify(crmStorage));
        updateUI();
        this.reset();
    });

    // Instant Search Logic
    document.getElementById('search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const rows = document.querySelectorAll('#crmTableBody tr');
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
        });
    });

    function exportExcel() {
        if(crmStorage.length === 0) return alert("Pehle data toh save kijiye!");
        let csv = "TicketID,Name,Phone,Email,City,Invoice,SKU,Serial,Type,Priority,Warranty,Status,Source,Date\n";
        crmStorage.forEach(t => {
            csv += `${t.id},${t.name},${t.phone},${t.email},${t.city},${t.inv},${t.sku},${t.sn},${t.type},${t.priority},${t.warranty},${t.status},${t.source},${t.date}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Noor-Tech-Master-Data.csv';
        a.click();
    }

    updateUI();
</script>

</body>
</html>
